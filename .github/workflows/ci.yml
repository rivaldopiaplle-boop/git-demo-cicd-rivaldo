# Integration continue , deploiement continu
name: Integration continue
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  #tester le frontend, backend, integration et build image
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: run frontend tests
        run: npm test

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: ${{secrets.CI_CD_PASSWORD}}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      DB_URL: localhost
      DB_USERNAME: root
      DB_PASSWORD: ${{secrets.CI_CD_PASSWORD}}
      DB_DATABASE: testdb
    steps:
      - uses: actions/checkout@v3
      - name: Set up .NET core SDK 6
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: "6.0.x"
      - name: Install dependencies
        run: dotnet restore Backend.sln
      - name: Run backend tests
        run: dotnet test Backend.sln --no-restore --verbosity normal
  integration-test:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: ${{secrets.CI_CD_PASSWORD}}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      MYSQL_PASSWORD: ${{secrets.CI_CD_PASSWORD}}

    steps:
      - uses: actions/checkout@v3
      - name: Run database migration
        run: bash ./bootstrap-mysql.sh
        working-directory: mysql
      - name: Start components
        run: docker compose -f docker-compose.build.yml up -d
        env:
          DOCKER_NETWORK: ${{ job.services.mysql.network }}
      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
      - name: Run integration tests
        run: |
          export PUPPETEER_EXECUTABLE_PATH="${{ steps.setup-chrome.outputs.chrome-path }}"
          export DB_PASSWORD=${{secrets.CI_CD_PASSWORD}}
          bash ./run_integration.sh
        working-directory: k6
      - name: Stop components
        run: docker compose -f docker-compose.build.yml down

  build-image:
    runs-on: ubuntu-latest
    needs: [integration-test]
    strategy:
      matrix:
        component: ["frontend", "backend"]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v3
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          tags: ghcr.io/${{ github.repository_owner }}/spm-${{ matrix.component }}:${{ github.ref_name }}
